<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=2.0"/>
<title>Fly Decision | Análisis automático del pronóstico meteorológico para volar en parapente. Mapa de despegues.</title>
<meta name="description" content="Análisis automático del pronóstico de tiempo y orientaciones para despegues de parapente. Tabla con lugares de vuelo y predicciones por horas para los próximos días, con evaluación visual por colores 🟩🟨🟥 según límites de seguridad personalizables. Ayuda para decidir dónde puedes ir a volar en parapente. Mapa de despegues.">
<meta property="og:description" content="Análisis automático del pronóstico y orientaciones para despegues de parapente. Tabla con lugares de vuelo y predicciones por horas para los próximos días, con evaluación visual por colores 🟩🟨🟥 según límites de seguridad personalizables. Ayuda para decidir dónde puedes ir a volar en parapente.">
<meta property="og:image" content="https://flydecision.com/icons/logo_192px.png">
<meta property="og:type" content="website">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<link rel="canonical" href="https://flydecision.com/"/>
<link rel="icon" type="image/png" sizes="192x192" href="https://flydecision.com/icons/logo_192px.png">
<link rel="icon" type="image/png" sizes="512x512" href="https://flydecision.com/icons/logo_512px.png">
<link rel="shortcut icon" href="https://flydecision.com/icons/logo_192px.png">
<link rel="apple-touch-icon" href="https://flydecision.com/icons/logo_192px.png">
<meta name="theme-color" content="#d9ebf9"> 

<link rel="manifest" href="manifest.json">

<script src="config.js"></script>

<script>window.WEB_VERSION = "2.1";</script>
<link rel="stylesheet" href="meteo.css?v=2.1">
<script src="meteo.js?v=2.1" defer></script>

<link rel="stylesheet" href="css/nouislider.min.css">
<link rel="stylesheet" href="css/leaflet.css" />
<link rel="stylesheet" href="css/driver.css" />

<script src="js/nouislider.min.js"></script>
<script src="js/popper.min.js" defer></script>
<script src="js/tippy-bundle.umd.min.js" defer></script>
<script src="js/leaflet.js" defer></script>
<script src="js/driver.js.iife.js"></script>

</head>

<body>
<!-- MENSAJE SIN CONEXIÓN -->
<div id="offline-indicator" class="offline-badge" style="display: none;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22.61 16.95A5 5 0 0 0 18 10h-1.26a8 8 0 0 0-7.05-6M5 5a8 8 0 0 0 4 7h.5"></path>
        <line x1="2" y1="2" x2="22" y2="22"></line>
    </svg>
    <span>Esperando conexión...</span>
</div>

<!-- MENSAJE ACTUALIZANDO... -->
<div id="msgActualizando..." class="loader-container">
    <div class="loader-box">
        <div class="spinner"></div> 
    </div> 
</div>

<!-- 🟦🟦 CONTENEDOR PRINCIPAL MENÚS, BOTONES Y PANELES DE FILTROS  -->

<div class="contenedor-principal-controles">

	<!-- 🟦 MENÚ  -->

	<div id="div-menu" class="div-menu">	

		<div id="buscador-wrapper" class="buscador-con-boton" style="position: relative;">
			<input type="search" 
			id="buscador-despegues-provincias"
			name="search_query_unique_xyz" 
			placeholder="🔍"
			onkeyup="filtrarDespeguesProvincias()"
			autocomplete="off" 
			autocorrect="off" 
			autocapitalize="off" 
			spellcheck="false"
			enterkeyhint="search"
			aria-label="Buscador de despegues"
			title="Buscador de despegues">
			<button id="limpiar-buscador" type="button" style="display: none;">&times;</button>
		</div>

		<button id="btn-div-filtro-distancia-toggle" title="Filtro de distancia al despegue" onclick="alternardivDistancia(event)" style="position: relative;">
			<img src="icons/icono_filtro_60.webp" width="20" height="20" style="position: absolute; bottom: 4px; right: 9px;">
			<span style="position: absolute; bottom: 2px; right: 0px; font-size: 12px; line-height: 1; border-radius: 50%;">📍</span>
		</button>

		<button id="btn-filtro-favoritos-toggle" class="group-edit" title="Ver solo favoritos" onclick="filtroVerSoloFavoritos()" style="position: relative;">
			<img src="icons/icono_filtro_60.webp" width="20" height="20" style="position: absolute; bottom: 4px; right: 9px;">
			<span style="position: absolute; bottom: 2px; right: 0px; font-size: 10px; line-height: 1; border-radius: 50%;">❤️</span>
		</button>

		<button id="btn-desmarcar-favoritos" class="group-edit" title="Desmarcar favoritos" onclick="desmarcarFavoritos()" style="position: relative;">
			<span style="font-size: 20px;">🤍</span>
		</button>

		<button id="btn-abrir-favoritos" class="group-edit" title="Abrir favoritos" onclick="abrirFavoritos()" style="position: relative;">
			<span style="font-size: 20px;">📂</span>
		</button>

		<button id="btn-guardar-favoritos" class="group-edit" title="Guardar favoritos" onclick="guardarFavoritos()" style="position: relative;">
			<span style="font-size: 20px;">💾</span>
		</button>

		<button id="btn-mapa-despegues" class="group-normal" title="Mapa de despegues" aria-label="Mapa de despegues" onclick="abrirLinkExterno('https://flydecision.com/map/')" style="position: relative;">
			<img src="icons/icono_tierra_60.webp" width="20" height="20" style="position: absolute; bottom: 4px; right: 9px;">
		</button>

		<button id="btn-activar-edicion-favoritos" class="group-normal" title="Editar despegues favoritos" onclick="activarEdicionFavoritos()" style="position: relative;"> 
			<img src="icons/icono_parapente_60.webp" width="20" height="20" style="position: absolute; bottom: 4px; right: 9px;">
			<span style="position: absolute; bottom: 2px; right: 0px; font-size: 10px; line-height: 1; border-radius: 50%;">❤️</span>
		</button>

		<button id="btn-guia-edicion-favoritos" class="group-edit" title="Guía de la pantalla de editar despegues favoritos" onclick="sugerirGuiaFavoritos(true)" style="position: relative;"> 
			<img src="icons/icono_ayuda_60.webp" width="20" height="20" style="position: absolute; bottom: 4px; right: 9px;">
		</button>

		<button id="btn-div-configuracion-toggle" class="group-normal" title="Configuración" onclick="alternardivConfiguracion(event)" style="position: relative;"> 
			<img src="icons/icono_configuracion_60.webp" width="20" height="20" style="position: absolute; bottom: 4px; right: 9px;">
		</button>

	</div>

	<!-- 🟦 FILTRO HORARIO  -->

	<div class="div-filtro-horario">
		<div class="div-paneles-controles-transparente">
			<div id="horario-slider"></div>
		</div>
	</div>

	<!-- 🟦 FILTRO DISTANCIA  -->

	<div id="div-filtro-distancia" class="div-filtro-distancia">

		<div class="div-paneles-controles-transparente">
		
			<div id="titulo-distancia-slider" style="display: flex; align-items: center; gap: 7px; margin-bottom: 5px;">
				<span style="cursor: pointer;">Filtro de distancia desde</span>
				<button id="btn-abrir-geo-menu" class="btn-icon-trigger" title="Cambiar ubicación de origen">📍</button>
				
				<button id="btn-incluir-no-favs-distancia" class="btn-icon-trigger" style="width: auto; padding: 0 8px; margin-left: 25px; margin-right: 30px;font-size: 16px; height: 26px; line-height: 1; transition: all 0.2s;" title="Incluir despegues no favoritos en el filtro">🤍+❤️</button>
			</div>	
			
			<div id="distancia-slider" role="slider" aria-labelledby="titulo-distancia-slider"></div>

			<button id="btn-reset-filtro-distancia" class="btn-reset-filtro btn-arriba-izquierda" style="left: 1px; top: 0px; display:none;" title="Restablecer y ocultar filtro de distancia" onclick="resetFiltroDistancia()">
				<span><b>↺</b></span>
			</button>
			
			<button class="btn-info btn-abajo-derecha"
					style="right: 7px; bottom: 8px;"
					data-tippy-content="
						<b>Filtro de distancia al despegue:</b><br><br>
						Muestra solo despegues dentro del radio de distancia que selecciones.<br><br>
						Usa el botón <span style='background-color: #e0e0e0; border: 1px solid #a0a0a0; border-radius: 4px; display: inline-block;'>📍</span> para establecer la posición de origen directamente en el mapa o mediante el GPS del móvil.<br><br>
						Usa el botón <span style='background-color: #e0e0e0; border: 1px solid #a0a0a0; border-radius: 4px; display: inline-block;'>🤍+❤️</span> para incluir despegues no favoritos en el filtro, es decir, para incluir TODOS los despegues disponibles en la base de datos. Al activarlo, se activará inicialmente un filtro de 100 km para no saturar la tabla, pero puedes cambiarlo según tus necesidades y potencia de tu dispositivo.
					">
				<img src="icons/info.svg" alt="Más información" style="width: 20px; height: 20px; vertical-align: middle;">
			</button>

		</div>
			
	</div>

	<!-- 🟦 FILTRO CONDICIONES  -->

	<div id="div-filtro-condiciones" class="div-filtro-condiciones">

		<div class="div-paneles-controles-transparente">
		
			<div id="titulo-condiciones-slider" style="margin-bottom: 5px;">
				<span style="display: inline-flex; align-items: center; gap: 6px;">
					Filtro de condiciones 
					<img src="icons/icono_viento_48x42.webp" width="16" height="14" style="display: block;" title="Viento medio a 10 m (km/h)">
					<img src="icons/icono_racha_48x42.webp" width="16" height="14" style="display: block;" title="Racha máxima a 10 m (km/h)">
					<img src="icons/icono_direccion_45.webp" width="15" height="15" style="display: block;" title="Dirección del viento">
				</span>
			</div>	
			
			<div id="condiciones-slider" role="slider" aria-labelledby="titulo-condiciones-slider"></div>

			<button id="btn-reset-filtro-condiciones" class="btn-reset-filtro btn-arriba-izquierda" style="left: 1px; top: 0px; display:none;" title="Restablecer y ocultar filtro de condiciones" onclick="resetFiltroCondiciones()">
				<span><b>↺</b></span>
			</button>

			<button class="btn-info btn-abajo-derecha" style="right: 7px; bottom: 8px;" data-tippy-content="<b>Filtro de condiciones en el despegue:</b><br><br>Muestra solo despegues con una puntuación de condiciones igual o mayor a la seleccionada.">
				<img src="icons/info.svg" alt="Más información" style="width: 20px; height: 20px; vertical-align: middle;">
			</button>

		</div>
			
	</div>

	<!-- 🟦 MENÚ2 EDICIÓN FAVORITOS  -->
	
	<div id="div-menu2-edicion-favoritos" class="div-menu2-edicion-favoritos">

		<span id="contador-favoritos-texto" style="font-size: 18px; font-weight: bold;">❤️ 0</span>

		<button id="btn-finalizar-edicion-favoritos" class="btn-finalizar-edicion-favoritos" title="Finalizar edición de despegues favoritos" onclick="finalizarEdicionFavoritos()">
			Finalizar edición de despegues favoritos
		</button>

	</div>

</div>

<!-- 🟦🟦 CONFIGURACIÓN  -->

<div id="div-configuracion" class="div-configuracion">

	<button class="btn-cerrar-modal" onclick="alternardivConfiguracion(event)">&times;</button>
	<div class="panel-titulo" style="font-size: 1.4em;">Configuración</div>
	<div class="div-configuracion-subpanel">
		<div class="div-paneles-controles-sin-pips">
			<div class="linea-con-bt-info" style="justify-content: center;">
				<div id="titulo-velocidad-slider" style="display: flex; align-items: center; gap: 6px; font-weight: bold;">
					<img src="icons/icono_viento_60.webp" width="20" height="20" style="display: block;"><span>Viento medio</span>
				</div>
			</div>
			<div id="velocidad-slider" role="slider" aria-labelledby="titulo-velocidad-slider"></div>
		</div>

		<div class="div-paneles-controles-sin-pips">
			<div class="linea-con-bt-info" style="justify-content: center;">
				<div id="titulo-racha-slider" style="display: flex; align-items: center; gap: 6px; font-weight: bold;">
					<img src="icons/icono_racha_60.webp" width="20" style="display: block;"><span>Racha máxima</span>
				</div>
			</div>
			<div id="racha-slider" role="slider" aria-labelledby="titulo-racha-slider"></div>
		</div>
	</div>

	<div class="div-configuracion-subpanel">
		<div class="div-paneles-controles">
			<div class="linea-con-bt-info" style="justify-content: center;">
				<div id="titulo-configuracion-horario-slider" style="display: flex; align-items: center; gap: 6px; font-weight: bold;">
					<span style="font-size:1.2em; display: block;">🕜</span>
					<span>Horario de vuelo preferido</span>
				</div>
			</div>
			<div id="configuracion-horario-slider" role="slider" aria-labelledby="titulo-configuracion-horario-slider"></div>
		</div>
		
		<details class="config-accordion">
			<summary>Datos meteorológicos opcionales</summary>
			<div class="accordion-content">
				<div class="linea-con-bt-info">
					<label for="chkMostrarProbPrecipitacion" class="custom-checkbox">
						<input type="checkbox" id="chkMostrarProbPrecipitacion" onclick="alternarMostrarProbPrecipitacion()"> Probabilidad de Precipitación
					</label>
				</div>
				<div class="linea-con-bt-info">
					<label for="chkMostrarVientoAlturas" class="custom-checkbox">
						<input type="checkbox" id="chkMostrarVientoAlturas" onclick="alternarMostrarVientoAlturas()"> Viento a 80, 120 y 180 m
					</label>
				</div>
				<div class="linea-con-bt-info">
					<label for="chkMostrarXC" class="custom-checkbox">
						<input type="checkbox" id="chkMostrarXC" onclick="alternarMostrarXC()"> XC: Techo AGL, CAPE y CIN
					</label>
				</div>
			</div>
		</details>

		<details class="config-accordion">
			<summary>Datos calculados y opciones</summary>
			<div class="accordion-content">
				<div class="linea-con-bt-info">
					<label for="chkMostrarSoloHorasDiurnas" class="custom-checkbox">
						<input type="checkbox" id="chkMostrarSoloHorasDiurnas" onclick="alternarHorasNoche()"> Solo horas diurnas
					</label>
				</div>
				<div class="linea-con-bt-info">
					<label for="chkMostrarCizalladura" class="custom-checkbox">
						<input type="checkbox" id="chkMostrarCizalladura" onclick="alternarMostrarCizalladura()"> Cizalladura / Fiabilidad
					</label>
				</div>
				<div class="linea-con-bt-info">
					<label for="chkMostrarRafagosidad" class="custom-checkbox">
						<input type="checkbox" id="chkMostrarRafagosidad" onclick="alternarMostrarRafagosidad()"> Rafagosidad
					</label>
				</div>
				<div class="linea-con-bt-info">
					<label for="chkAplicarCalibracion" class="custom-checkbox">
						<input type="checkbox" id="chkAplicarCalibracion" onclick="alternarAplicarCalibracion()"> Aplicar calibración (beta)
					</label>
				</div>
			</div>
		</details>
 	</div>

	<div class="div-configuracion-subpanel">
		<div class="div-paneles-controles" style="min-height: initial; padding-top: 5px; padding-bottom: 5px;">
			<span style="font-weight: bold; display: block; text-align: left; padding-bottom: 5px; padding-left: 15px;">Actualizaciones modelos meteo</span>
			<span id="data_generation_time"></span>
			<div id="proxima-actualizacion-contenedor" style="padding-left:15px;">	
				<span id="proxima-actualizacion"></span><br>
			</div>
		</div>
	</div>

	<div class="div-configuracion-subpanel" style="display: flex; justify-content: center; align-items: center;">
		<div class="div-paneles-controles" style="border: none; background-color: #ffffff; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; min-height: auto; box-sizing: border-box; box-shadow: none;">
			<button class="btn-accion" onclick="btnRestablecerConfiguración()" style="color: #ff0000; border: 1px solid #ff0000; width: 34px; height: 34px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 0; margin: 0;" title="Eliminar todas las configuraciones, favoritos y preferencias y volver a la configuración inicial">🔄</button>
			<a href="https://play.google.com/store/apps/details?id=com.flydecision" target="_blank" rel="noopener" class="badge-google-play" style="display: flex; align-items: center; text-decoration: none !important; margin: 0; flex-shrink: 0;">
				<img alt="Disponible en Google Play" src="https://flydecision.com/GetItOnGooglePlay_Badge_Web_color_Spanish.png" style="height: 34px; width: auto; display: block;">
			</a>
			<div class="enlaces-legales" style="display: flex; align-items: center; gap: 5px; white-space: nowrap; margin: 0;">
				<a href="#" onclick="sugerirGuiaPrincipal(true)">Guía</a>
				<span class="separador" style="color: #ccc;">|</span>
				<a href="https://flydecision.com/ayuda" onclick="abrirLinkExterno(this.href); return false;">Ayuda</a>
				<span class="separador" style="color: #ccc;">|</span>
				<a href="https://flydecision.com/privacidad" onclick="abrirLinkExterno(this.href); return false;">Legal</a>
				<span class="separador" style="color: #ccc;">|</span>
				<span id="web-version-text" style="font-size: 12px; color: #666;"></span>
			</div>
		</div>
	</div>
</div>

<!-- 🟦🟦 TABLA  -->

<div class="contenedor-principal-tabla">
	<div class="contador-despegues" id="contador-despegues"></div>
	<div class="tabla-wrapper">
		<table id="tabla"></table>
		<div id="sugerencias-globales" class="sugerencias-globales" style="display:none;"></div>
	</div>
</div>

<!-- 🟦🟦 Overlay Mapa Selección Origen (Unificado) -->

<div id="modal-mapa" class="modal-overlay" style="display:none;">
	<div class="modal-content map-modal-size">
        <div class="modal-header">
            <h3>📍 Seleccionar origen</h3>
            <button id="btn-cerrar-mapa" class="close-x">×</button>
        </div>
        
		<div id="mapa-selector" style="height: 100%; width: 100%; margin-top: 10px; margin-bottom: 15px;"></div>

		<div class="modal-footer" style="margin-top: 0; display: flex; justify-content: center;">
            <button id="btn-gps-mapa" class="btn-option" style="width: 170px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; margin-bottom: 7px; padding: 0px;">
				<span style="font-size: 1.8rem; margin: 0;">🛰️</span>
				<span style="font-size: 0.9rem; font-weight: bold; text-align: center; line-height: 1.2;">Ubicación del móvil</span>
			</button>
		</div>
	</div>
</div>

</body>
</html>
